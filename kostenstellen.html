<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kostenstellen Übersicht</title>
<style>
:root{
  --s-blue-dark:#1c3664;
  --s-blue-mid:#1a5276;
  --s-blue-light:#2e86c1;
  --s-blue-pale:#d6eaf8;
  --s-bg:#f4f6f8;
  --s-text-primary:#1a1a2e;
  --s-text-muted:#5d6d7e;
  --s-border:#d5d8dc;
  --s-red:#c0392b;
  --s-green:#1e8449;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  background:var(--s-bg);
  color:var(--s-text-primary);
  padding:24px;
}
.header-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
  position:relative;
}
h1{
  font-size:20px;
  color:var(--s-blue-dark);
  margin:0;
}
.menu-wrap{ position:relative; }
.menu-btn{
  padding:8px 14px;
  border:1px solid var(--s-blue-mid);
  background:#fff;
  color:var(--s-blue-mid);
  border-radius:4px;
  font-size:13px;
  cursor:pointer;
}
.menu-btn:hover{ background:var(--s-blue-pale); }
.sync-panel{
  display:none;
  position:absolute;
  right:0;
  top:calc(100% + 6px);
  background:#fff;
  border:1px solid var(--s-border);
  border-radius:8px;
  padding:14px;
  width:360px;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
  z-index:20;
}
.sync-panel.open{ display:block; }
.sync-panel label{
  font-size:12px;
  color:var(--s-text-muted);
  display:block;
  margin-bottom:4px;
}
.sync-panel input[type="text"]{
  width:100%;
  padding:7px 10px;
  border:1px solid var(--s-border);
  border-radius:4px;
  font-size:13px;
  margin-bottom:8px;
}
.sync-panel .btn-row{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}
.sync-panel button{
  padding:7px 12px;
  border:1px solid var(--s-blue-mid);
  background:var(--s-blue-mid);
  color:#fff;
  border-radius:4px;
  font-size:13px;
  cursor:pointer;
}
.sync-panel button.secondary{
  background:#fff;
  color:var(--s-blue-mid);
}
.sync-status{
  font-size:12px;
  color:var(--s-text-muted);
  display:block;
}
.sync-status.ok{ color:var(--s-green); }
.sync-status.error{ color:var(--s-red); }
.sync-status.busy{ color:var(--s-blue-mid); }
.count{
  font-size:13px;
  color:var(--s-text-muted);
  margin-bottom:8px;
}
.table-wrap{
  background:#fff;
  border:1px solid var(--s-border);
  border-radius:8px;
  overflow:hidden;
}
table{
  border-collapse:collapse;
  width:100%;
  font-size:13px;
}
thead th{
  background:var(--s-blue-pale);
  color:var(--s-blue-dark);
  text-align:left;
  padding:8px;
  cursor:pointer;
  user-select:none;
  position:sticky;
  top:0;
  border-bottom:1px solid var(--s-blue-light);
  white-space:nowrap;
}
thead th:hover{ background:#c3e0f5; }
thead th .arrow{ font-size:10px; color:var(--s-blue-mid); margin-left:4px; }
thead tr.filter-row th{
  cursor:default;
  padding:5px 6px;
  position:sticky;
  top:34px;
  border-bottom:2px solid var(--s-blue-light);
}
thead tr.filter-row input,
thead tr.filter-row select{
  width:100%;
  font-size:12px;
  padding:4px 5px;
  border:1px solid var(--s-border);
  border-radius:4px;
  font-weight:normal;
  color:var(--s-text-primary);
  background:#fff;
}
tbody td{
  padding:8px;
  border-bottom:1px solid var(--s-border);
  white-space:nowrap;
}
tbody tr:hover{ background:var(--s-bg); }
tbody tr:nth-child(even){ background:#fafbfc; }
tbody tr:nth-child(even):hover{ background:var(--s-bg); }
.kart-E{ color:var(--s-blue-mid); font-weight:600; }
.kart-H{ color:var(--s-blue-dark); font-weight:600; }
.kart-F{ color:var(--s-green); font-weight:600; }
.kart-G{ color:var(--s-red); font-weight:600; }
.no-results{
  padding:24px;
  text-align:center;
  color:var(--s-text-muted);
}
.table-scroll{
  max-height:70vh;
  overflow:auto;
}
.edit-input{
  width:130px;
  padding:4px 6px;
  border:1px solid var(--s-border);
  border-radius:4px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="header-row">
  <h1>Kostenstellen Übersicht</h1>
  <div class="menu-wrap">
    <button class="menu-btn" id="menuBtn">⚙ Sync Settings</button>
    <div class="sync-panel" id="syncPanel">
      <label for="sheetUrl">Apps Script Web-App URL</label>
      <input type="text" id="sheetUrl" placeholder=".../exec" value="https://script.google.com/macros/s/AKfycbz1e1zsmVh4fvkDSbg9NOpQkKTLFM03qWj2EQuvIjPVGbMgE2OMSrLnQvTR4s45cu0s/exec">
      <div class="btn-row">
        <button id="connectBtn">Verbinden</button>
        <button class="secondary" id="reloadBtn">Neu laden</button>
      </div>
      <span id="syncStatus" class="sync-status">nicht verbunden</span>
    </div>
  </div>
</div>

<div class="count" id="count"></div>

<div class="table-wrap">
  <div class="table-scroll">
    <table id="table">
      <thead>

          <th data-key="kkrs">KKrs <span class="arrow"></span></th>
          <th data-key="bukr">BuKr <span class="arrow"></span></th>

          <th data-key="verantwortlicher">Verantwortlicher <span class="arrow"></span></th>
          <th data-key="verantwben">VerantwBen <span class="arrow"></span></th>
          <th data-key="kurztext">Kurztext <span class="arrow"></span></th>
          <th data-key="sprache">Sprache <span class="arrow"></span></th>
          <th data-key="gueltigab">Gültig ab <span class="arrow"></span></th>
          <th data-key="bis">bis <span class="arrow"></span></th>
          <th data-key="aktiv">Aktiv? <span class="arrow"></span></th>
          <th data-key="neuerVerantw">Neuer Verantwortlicher <span class="arrow"></span></th>
          <th data-key="neuerKkrs" title="Falls der KKrs nicht mehr stimmt: korrekten Kostenrechnungskreis hier eintragen.">Korrekter KKrs <span class="arrow"></span></th>
        </tr>
        <tr class="filter-row" id="filterRow"></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

data.forEach((d,i)=>{
  d._idx = i;
  if(d.aktiv === undefined) d.aktiv = true;
  if(d.neuerVerantw === undefined) d.neuerVerantw = '';
  if(d.neuerKkrs === undefined) d.neuerKkrs = '';
});

// Spaltendefinition: type 'text' = Freitextfilter, 'select' = Dropdown, 'boolselect' = Ja/Nein/Alle
const columns = [
  {key:'kostenst', type:'text'},
  {key:'kkrs', type:'select'},
  {key:'bukr', type:'select'},
  {key:'kart', type:'select'},
  {key:'verantwortlicher', type:'select'},
  {key:'verantwben', type:'text'},
  {key:'kurztext', type:'text'},
  {key:'sprache', type:'select'},
  {key:'gueltigab', type:'text'},
  {key:'bis', type:'text'},
  {key:'aktiv', type:'boolselect'},
  {key:'neuerVerantw', type:'text'},
  {key:'neuerKkrs', type:'text'}
];

const colFilters = {};
columns.forEach(c=>colFilters[c.key] = '');

let sortKey = null;
let sortDir = 1;

const tbody = document.getElementById('tbody');
const countEl = document.getElementById('count');
const filterRow = document.getElementById('filterRow');

function buildFilterRow(){
  filterRow.innerHTML = '';
  columns.forEach(col=>{
    const th = document.createElement('th');
    if(col.type === 'text'){
      th.innerHTML = `<input type="text" data-key="${col.key}" placeholder="Filter...">`;
    } else if(col.type === 'select'){
      const values = [...new Set(data.map(d=>d[col.key]).filter(v=>v !== ''))].sort();
      let opts = '<option value="">Alle</option>';
      values.forEach(v=>{ opts += `<option value="${v}">${v}</option>`; });
      th.innerHTML = `<select data-key="${col.key}">${opts}</select>`;
    } else if(col.type === 'boolselect'){
      th.innerHTML = `<select data-key="${col.key}">
        <option value="">Alle</option>
        <option value="ja">Ja</option>
        <option value="nein">Nein</option>
      </select>`;
    }
    filterRow.appendChild(th);
  });

  filterRow.querySelectorAll('input, select').forEach(el=>{
    const evt = el.tagName === 'SELECT' ? 'change' : 'input';
    el.addEventListener(evt, ()=>{
      colFilters[el.dataset.key] = el.value.trim().toLowerCase();
      render();
    });
  });
}

function render(){
  let rows = data.filter(d=>{
    for(const col of columns){
      const f = colFilters[col.key];
      if(!f) continue;
      if(col.key === 'aktiv'){
        const val = d.aktiv ? 'ja' : 'nein';
        if(val !== f) return false;
      } else if(col.type === 'select'){
        if(String(d[col.key]).toLowerCase() !== f) return false;
      } else {
        if(!String(d[col.key]).toLowerCase().includes(f)) return false;
      }
    }
    return true;
  });

  if(sortKey){
    rows = rows.slice().sort((a,b)=>{
      let va = a[sortKey], vb = b[sortKey];
      if(sortKey === 'aktiv'){ va = va ? 1 : 0; vb = vb ? 1 : 0; }
      if(va < vb) return -1*sortDir;
      if(va > vb) return 1*sortDir;
      return 0;
    });
  }

  tbody.innerHTML = '';
  if(rows.length === 0){
    tbody.innerHTML = '<tr><td colspan="13" class="no-results">Keine Treffer</td></tr>';
  } else {
    rows.forEach(d=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${d.kostenst}</td>
        <td>${d.kkrs}</td>
        <td>${d.bukr}</td>
        <td class="kart-${d.kart}" title="${kartLegend[d.kart] || d.kart}">${d.kart}</td>
        <td>${d.verantwortlicher}</td>
        <td>${d.verantwben}</td>
        <td>${d.kurztext}</td>
        <td>${d.sprache}</td>
        <td>${d.gueltigab}</td>
        <td>${d.bis}</td>
        <td style="text-align:center;"><input type="checkbox" class="aktiv-cb" data-idx="${d._idx}" ${d.aktiv?'checked':''}></td>
        <td><input type="text" class="edit-input neuerverantw-input" data-idx="${d._idx}" placeholder="neuer Name" value="${d.neuerVerantw}"></td>
        <td><input type="text" class="edit-input neuerkkrs-input" data-idx="${d._idx}" placeholder="korrekter KKrs" value="${d.neuerKkrs}" title="Falls der KKrs nicht mehr stimmt: korrekten Kostenrechnungskreis hier eintragen."></td>
      `;
      if(!d.aktiv){ tr.style.opacity = '0.5'; tr.style.textDecoration = 'line-through'; }
      tbody.appendChild(tr);
    });
  }

  countEl.textContent = `${rows.length} von ${data.length} Einträgen`;
}

tbody.addEventListener('change', (e)=>{
  const idx = e.target.dataset.idx;
  if(idx === undefined) return;
  const d = data[idx];
  if(e.target.classList.contains('aktiv-cb')){
    d.aktiv = e.target.checked;
    const tr = e.target.closest('tr');
    tr.style.opacity = d.aktiv ? '1' : '0.5';
    tr.style.textDecoration = d.aktiv ? 'none' : 'line-through';
    scheduleSave();
  }
});

tbody.addEventListener('input', (e)=>{
  const idx = e.target.dataset.idx;
  if(idx === undefined) return;
  if(e.target.classList.contains('neuerverantw-input')){
    data[idx].neuerVerantw = e.target.value;
    scheduleSave();
  }
  if(e.target.classList.contains('neuerkkrs-input')){
    data[idx].neuerKkrs = e.target.value;
    scheduleSave();
  }
});

document.querySelectorAll('thead th[data-key]').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.getAttribute('data-key');
    if(sortKey === key){
      sortDir *= -1;
    } else {
      sortKey = key;
      sortDir = 1;
    }
    document.querySelectorAll('th .arrow').forEach(a=>a.textContent='');
    th.querySelector('.arrow').textContent = sortDir === 1 ? '▲' : '▼';
    render();
  });
});

buildFilterRow();
render();

const menuBtn = document.getElementById('menuBtn');
const syncPanel = document.getElementById('syncPanel');
menuBtn.addEventListener('click', (e)=>{
  e.stopPropagation();
  syncPanel.classList.toggle('open');
});
document.addEventListener('click', (e)=>{
  if(!syncPanel.contains(e.target) && e.target !== menuBtn){
    syncPanel.classList.remove('open');
  }
});

// --- Google Sheet Sync ---
const sheetUrlEl = document.getElementById('sheetUrl');
const connectBtn = document.getElementById('connectBtn');
const reloadBtn = document.getElementById('reloadBtn');
const syncStatusEl = document.getElementById('syncStatus');

let saveTimer = null;

function setStatus(text, cls){
  syncStatusEl.textContent = text;
  syncStatusEl.className = 'sync-status' + (cls ? ' ' + cls : '');
}

function getUrl(){
  return sheetUrlEl.value.trim();
}

async function loadFromSheet(){
  const url = getUrl();
  if(!url){ setStatus('keine URL hinterlegt', 'error'); return; }
  setStatus('lade...', 'busy');
  try{
    const res = await fetch(url, { method:'GET' });
    const json = await res.json();
    if(Array.isArray(json) && json.length > 0){
      data.length = 0;
      json.forEach((d,i)=>{
        d._idx = i;
        if(d.aktiv === undefined) d.aktiv = true;
        if(d.neuerVerantw === undefined) d.neuerVerantw = '';
        if(d.neuerKkrs === undefined) d.neuerKkrs = '';
        data.push(d);
      });
      buildFilterRow();
      render();
      setStatus('geladen aus Sheet', 'ok');
    } else {
      setStatus('Sheet ist leer, initiale Daten hochgeladen', 'ok');
      await saveToSheet();
    }
  } catch(err){
    setStatus('Fehler beim Laden: ' + err.message, 'error');
  }
}

async function saveToSheet(){
  const url = getUrl();
  if(!url) return;
  setStatus('speichere...', 'busy');
  try{
    await fetch(url, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    });
    setStatus('gespeichert ' + new Date().toLocaleTimeString('de-CH'), 'ok');
  } catch(err){
    setStatus('Fehler beim Speichern: ' + err.message, 'error');
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  setStatus('Änderung, speichere gleich...', 'busy');
  saveTimer = setTimeout(saveToSheet, 800);
}

connectBtn.addEventListener('click', ()=>{
  const url = getUrl();
  if(url) localStorage.setItem('kostenstellen_sheet_url', url);
  loadFromSheet();
});

reloadBtn.addEventListener('click', loadFromSheet);

const savedUrl = localStorage.getItem('kostenstellen_sheet_url');
if(savedUrl){
  sheetUrlEl.value = savedUrl;
}
loadFromSheet();
</script>
